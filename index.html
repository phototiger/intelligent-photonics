<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Han's Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10;--surface:#111318;--border:rgba(255,255,255,0.07);
    --text:#e8e6e0;--text-muted:#8a8880;--text-faint:#444240;
    --accent:#7eb8c9;--accent-warm:#c9a87e;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.8;overflow-x:hidden}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 4rem;background:rgba(10,12,16,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}

  /* nav 왼쪽: lab 라벨 */
  .nav-lab-label{font-size:0.72rem;letter-spacing:0.18em;color:var(--accent);text-transform:uppercase;display:flex;align-items:center;gap:1rem}
  .nav-lab-label::before{content:'';display:block;width:32px;height:1px;background:var(--accent)}

  .nav-links{display:flex;gap:2.5rem;list-style:none}
  .nav-links a{color:var(--text-muted);text-decoration:none;font-size:0.8rem;letter-spacing:0.06em;transition:color 0.2s}
  .nav-links a:hover{color:var(--accent)}

  #hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 4rem;overflow:hidden}
  .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 70% 50%,rgba(126,184,201,0.06) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 30% 80%,rgba(201,168,126,0.04) 0%,transparent 60%)}
  .hero-grid{position:absolute;inset:0;opacity:0.025;background-image:linear-gradient(rgba(126,184,201,0.8) 1px,transparent 1px),linear-gradient(90deg,rgba(126,184,201,0.8) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 70% 50%,black 0%,transparent 70%)}
  .hero-content{position:relative;max-width:720px;animation:fadeUp 1.2s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .hero-title{font-family:'Noto Serif KR',serif;font-size:clamp(2.8rem,6vw,5rem);font-weight:300;line-height:1.2;margin-bottom:2rem;color:#f0ede8}
  .hero-title em{font-style:normal;color:var(--accent)}
  .hero-sub{font-family:'Noto Serif KR',serif;font-size:clamp(1rem,1.6vw,1.2rem);font-weight:300;color:var(--text-muted);line-height:1.9;max-width:560px;margin-bottom:3rem;animation:fadeUp 1.2s 0.3s ease both}
  .hero-sub strong{color:var(--text);font-weight:400}
